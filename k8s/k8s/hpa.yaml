apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: zoom-clone-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: zoom-clone-app
  minReplicas: 2
  maxReplicas: 10 # Scale up to 10 pods during massive traffic spikes
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70 # If CPU hits 70%, add another pod