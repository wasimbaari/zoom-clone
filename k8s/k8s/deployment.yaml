apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoom-clone-app
  namespace: production
  labels:
    app: zoom-clone
spec:
  replicas: 2 # Start with High Availability (HA)
  selector:
    matchLabels:
      app: zoom-clone
  template:
    metadata:
      labels:
        app: zoom-clone
      # ==========================================
      # OTel Auto-Instrumentation Magic
      # ==========================================
      annotations:
        instrumentation.opentelemetry.io/inject-nodejs: "openobserve-collector/openobserve-nodejs"
    spec:
      # Industry Standard: Enforce non-root execution
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: zoom-clone-app
          # This image tag will be updated automatically by your CI pipeline or ArgoCD Image Updater
          image: 734367008253.dkr.ecr.ap-south-2.amazonaws.com/zoom-clone-app:9f747a807ec97cf958ce8078040b60e9acedd47f
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          
          # SRE Best Practice: Never deploy without resource requests and limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          
          # ==========================================
          # PROBES TEMPORARILY DISABLED
          # ==========================================
          # Disabled to investigate Next.js HTTP 500 error on /api/health
          # 
          # livenessProbe:
          #   httpGet:
          #     path: /api/health 
          #     port: 3000
          #   initialDelaySeconds: 20 
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # readinessProbe:
          #   httpGet:
          #     path: /api/health
          #     port: 3000
          #   initialDelaySeconds: 15
          #   periodSeconds: 10
          #   timeoutSeconds: 5
          #   failureThreshold: 3
          # ==========================================

          envFrom:
            - secretRef:
                name: zoom-clone-secrets # Maps Clerk and Stream API keys