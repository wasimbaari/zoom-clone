apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoom-clone-app
  namespace: production
  labels:
    app: zoom-clone
spec:
  replicas: 2 # Start with High Availability (HA)
  selector:
    matchLabels:
      app: zoom-clone
  template:
    metadata:
      labels:
        app: zoom-clone
    spec:
      # Industry Standard: Enforce non-root execution
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: zoom-clone-app
          # This image tag will be updated automatically by your CI pipeline or ArgoCD Image Updater
          image: 734367008253.dkr.ecr.ap-south-2.amazonaws.com/zoom-clone-app:cc36eaa89b26f29049812f83291ce56cbd7f5ca8
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          
          # SRE Best Practice: Never deploy without resource requests and limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          
         # ==========================================
          # SRE Best Practice: Health Probes
          # ==========================================
          livenessProbe:
            httpGet:
              path: /api/health # Dedicated unauthenticated endpoint
              port: 3000
            initialDelaySeconds: 20 # Give Next.js time to boot
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # ==========================================