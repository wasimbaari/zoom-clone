apiVersion: apps/v1
kind: Deployment
metadata:
  name: zoom-clone-app
  namespace: production
  labels:
    app: zoom-clone
spec:
  replicas: 2 # Start with High Availability (HA)
  selector:
    matchLabels:
      app: zoom-clone
  template:
    metadata:
      labels:
        app: zoom-clone
    spec:
      # Industry Standard: Enforce non-root execution
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: zoom-clone-app
          # This image tag will be updated automatically by your CI pipeline or ArgoCD Image Updater
          image: 734367008253.dkr.ecr.ap-south-2.amazonaws.com/zoom-clone-app:c6f93b256a39d704134eba8870c7b3d47f48aecc
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          
          # SRE Best Practice: Never deploy without resource requests and limits
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          
          # ==========================================
          # PROBES TEMPORARILY DISABLED
          # ==========================================
          # Disabled because Clerk auth intercepts the root path (/) and returns 
          # redirects/404s, causing Kubernetes to endlessly kill the pod.
          # 
          # livenessProbe:
          #   httpGet:
          #     path: /
          #     port: 3000
          #   initialDelaySeconds: 15
          #   periodSeconds: 20
          # readinessProbe:
          #   httpGet:
          #     path: /
          #     port: 3000
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
          # ==========================================

          envFrom:
            - secretRef:
                name: zoom-clone-secrets # Maps Clerk and Stream API keys