name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: ap-south-2
  ECR_REPOSITORY: zoom-clone-app
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

jobs:
  security-and-build:
    name: Build & Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # ==========================================
      # 1. SCA (Software Composition Analysis)
      # ==========================================
      - name: Snyk Vulnerability Scan
        uses: snyk/actions/node@master
        continue-on-error: true 
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

      # ==========================================
      # 2. SAST (Static Application Security Testing)
      # ==========================================
      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=wasimbaari_zoom-clone
            -Dsonar.organization=wasimbaari

      # ==========================================
      # 3. AWS Authentication & ECR Login
      # ==========================================
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ==========================================
      # 4. Docker Build
      # ==========================================
      - name: Build Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

      # ==========================================
      # 5. Container Security Scan
      # ==========================================
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL'

      # ==========================================
      # 6. Push to Registry (If scans pass)
      # ==========================================
      - name: Push Image to ECR
        if: success()
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy-gitops:
    name: Update GitOps Manifests
    needs: security-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # This ensures the bot has permission to push the commit back to the repository
          token: ${{ secrets.GITHUB_TOKEN }}

      # ==========================================
      # 7. Update Kubernetes Manifests (GitOps)
      # ==========================================
      - name: Update Image Tag in Deployment
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # The bulletproof regex that replaces the entire image line regardless of the old tag
          sed -i -E "s|image:.*|image: 734367008253.dkr.ecr.ap-south-2.amazonaws.com/zoom-clone-app:${IMAGE_TAG}|g" k8s/k8s/deployment.yaml

      - name: Commit and Push to Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/k8s/deployment.yaml
          git commit -m "chore(gitops): update image tag to ${{ github.sha }} [skip ci]"
          git push origin main